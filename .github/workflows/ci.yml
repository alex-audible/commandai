name: CI

# Runs the full test suite on REAL Linux, macOS, and Windows runners. The suite
# includes real-execution integration tests (tests/test_integration.py) that
# spawn the actual shell on each OS, so this is genuine cross-platform coverage,
# not just the maintainer's Mac with mocked platform identity.
#
# We pin a single Python version rather than testing a version matrix: the goal
# here is cross-OS / real-shell confidence, not Python-version compatibility.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only need to read the repo to test it.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single pinned Python version for every job (bump here when desired).
env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the whole matrix when one cell fails — a Windows-only
      # failure is exactly what we want to see in isolation.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show environment
        run: |
          python --version
          python -c "import platform, sys; print('platform:', platform.platform()); print('executable:', sys.executable)"

      - name: Run tests
        run: python -m pytest --cov=command_ai --cov-report=term-missing
