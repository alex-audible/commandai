# commandai configuration
#
# Copy to ~/.config/command-ai/config.toml and edit. Every setting is optional;
# anything omitted falls back to the built-in default shown here.
#
# Precedence (low → high): defaults < this file < env vars < command-line flags.
# Env var names: AI_BASE_URL, AI_MODEL, AI_API_KEY, AI_TEMPERATURE,
# AI_MAX_TOKENS, AI_TIMEOUT, AI_MAX_FILES, AI_MAX_DEPTH, AI_INCLUDE_HIDDEN,
# AI_MAX_EXPLORATIONS.

# --- Provider preset ---
# "local"      = an OpenAI-compatible server on your machine (LM Studio, Ollama…)
# "openrouter" = https://openrouter.ai (hosted; needs an API key)
#
# Set everything you want HERE so you never have to pass flags — once configured,
# you just type:  ai <request>
provider = "local"

# --- Endpoint / model ---
# base_url and model default from the provider above; set them to override.
# model    = "gemma-4-26b-a4b"
# base_url = "http://localhost:1234/v1"
# api_key  = "lm-studio"      # local ignores this

# ─────────────────────────────────────────────────────────────────────────────
# To use OpenRouter entirely from settings (no flags, fast):
#
#   1. Set:
#        provider = "openrouter"
#        model    = "anthropic/claude-3.5-sonnet"   # any OpenRouter model id
#   2. Provide your API key ONCE, either:
#        a) the secure way — store it in your OS keychain:
#             ai --provider openrouter --set-api-key
#        b) or just put it here (plaintext in this file):
#             api_key = "sk-or-v1-..."
#   3. Then simply run:  ai <request>
# ─────────────────────────────────────────────────────────────────────────────

# --- Generation ---
temperature       = 0.2
max_tokens        = 1024
timeout           = 120.0     # seconds
max_parse_retries = 2         # re-ask the model this many times if it returns invalid JSON

# --- Directory context the model sees ---
[context]
max_files      = 200          # cap entries shown in the tree
max_depth      = 2            # how deep the tree goes
include_hidden = false        # include dotfiles/dotdirs

# --- Filesystem exploration loop ---
[explore]
max_explorations = 4          # max directories the model may peek into before answering

# --- Web search (DuckDuckGo, no API key) ---
# Lets the model look up things like the right Homebrew formula for a described
# tool, e.g.  ai brew install a tool that flashes bootable images to usb drives
[web]
web_search     = true         # set false to disable web search entirely
max_searches   = 3            # max web searches per request
search_results = 5            # results returned per search
search_timeout = 15.0         # seconds

# --- Shell context ---
# Lets the model see the previous command's exit status and your recent command
# history (NOT command output), so you can say  ai fix that  after a failure.
# Provided by the `ai` shell function. Disable per-run with --no-shell-context.
[shell]
shell_context = true          # set false to never send shell history/exit code
max_history   = 15            # how many recent command lines to include
